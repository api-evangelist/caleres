description: >-
  Caleres is an American footwear company headquartered in Clayton, Missouri,
  established in 1878 (rebranded from Brown Shoe Company in 2015). It designs,
  develops, sources, manufactures, and distributes footwear through its Famous
  Footwear retail segment (approximately 900 U.S. locations) and Brand Portfolio
  segment which includes Sam Edelman, Stuart Weitzman, Allen Edmonds,
  Naturalizer, Vionic, LifeStride, Dr. Scholl's, Rykä, Franco Sarto, and
  Blowfish Malibu. Caleres does not currently publish a public developer API
  program; integrations are typically handled through B2B EDI and partner
  channels.
